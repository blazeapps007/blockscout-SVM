version: '3.9'

services:
  redis-db:
    extends:
      file: ./services/redis.yml
      service: redis-db

  db-init:
    extends:
      file: ./services/db.yml
      service: db-init

  db:
    depends_on:
      db-init:
        condition: service_completed_successfully
    extends:
      file: ./services/db.yml
      service: db

  # one-shot: the backend image runs as UID 10001 and needs to own its
  # bind-mounted dirs (same pattern as db-init)
  backend-init:
    image: postgres:17
    volumes:
      - ./logs/:/logs/
      - ./dets/:/dets/
    entrypoint:
      - sh
      - -c
      - |
        chown -R 10001:10001 /logs /dets

  backend:
    depends_on:
      db:
        condition: service_started
      redis-db:
        condition: service_started
      backend-init:
        condition: service_completed_successfully
    extends:
      file: ./services/backend.yml
      service: backend
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
      args:
        RELEASE_VERSION: 11.2.2
    # local fork build — must not be clobbered by upstream pulls
    # (services/backend.yml sets ghcr.io image + pull_policy: always)
    image: blockscout-svm:11.2.2
    pull_policy: build
    links:
      - db:database
    environment:
        # node runs on a separate server; WS (8546) binds loopback there and
        # is unreachable remotely, so no ETHEREUM_JSONRPC_WS_URL — HTTP polling
        ETHEREUM_JSONRPC_HTTP_URL: https://evm.steemscanner.com/
        ETHEREUM_JSONRPC_TRACE_URL: https://evm.steemscanner.com/
        CHAIN_ID: '8163'

  nft_media_handler:
    depends_on:
      - backend
    extends:
      file: ./services/nft_media_handler.yml
      service: nft_media_handler
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
      args:
        RELEASE_VERSION: 11.2.2
    image: blockscout-svm:11.2.2
    pull_policy: build

  visualizer:
    extends:
      file: ./services/visualizer.yml
      service: visualizer

  sig-provider:
    extends:
      file: ./services/sig-provider.yml
      service: sig-provider

  frontend:
    depends_on:
      - backend
    extends:
      file: ./services/frontend.yml
      service: frontend

  stats-db-init:
    extends:
      file: ./services/stats.yml
      service: stats-db-init

  stats-db:
    depends_on:
      stats-db-init:
        condition: service_completed_successfully
    extends:
      file: ./services/stats.yml
      service: stats-db

  stats:
    depends_on:
      - stats-db
      - backend
    extends:
      file: ./services/stats.yml
      service: stats

  user-ops-indexer:
    depends_on:
      - db
      - backend
    extends:
      file: ./services/user-ops-indexer.yml
      service: user-ops-indexer

  proxy:
    depends_on:
      - backend
      - frontend
      - stats
    extends:
      file: ./services/nginx.yml
      service: proxy
